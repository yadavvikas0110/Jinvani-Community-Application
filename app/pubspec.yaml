name: jinvani_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  file_picker: ^10.3.4
  image_picker: ^1.2.1
  flutter_svg: ^2.0.10+1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/splash/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/avatars/
    - assets/icons/nav/
    - assets/icons/quickview/
    - assets/icons/post/
    - assets/icons/common/
